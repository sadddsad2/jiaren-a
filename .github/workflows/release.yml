name: Build and Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress

      - name: Get version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "release_name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "release_name=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.release_name }}
          name: "RandomBots ${{ steps.get_version.outputs.release_name }}"
          body: |
            ## RandomBots ${{ steps.get_version.outputs.release_name }}
            ### 安装方法
            1. 下载 `RandomBots-${{ steps.get_version.outputs.version }}.jar`
            2. 放入服务器 `plugins/` 目录
            3. 重启服务器（插件会自动读取 `SERVER_PORT` 环境变量）
            ### 要求
            - Paper 1.21.4+
            - Java 17+
            ### 更新日志
            ${{ github.event.head_commit.message }}
            ---
            构建提交：${{ github.sha }}
          files: target/RandomBots-*.jar
          draft: false
          prerelease: false
