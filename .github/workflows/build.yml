name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 也支持手动触发

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress
        working-directory: fakeplayer-plugin

      - name: Get version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -f fakeplayer-plugin/pom.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # 如果是 tag 触发则用 tag 名，否则用 pom 版本 + commit 短哈希
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "release_name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "release_name=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.release_name }}
          name: "FakePlayer ${{ steps.get_version.outputs.release_name }}"
          body: |
            ## FakePlayer ${{ steps.get_version.outputs.release_name }}

            ### 安装方法
            1. 下载 `FakePlayer-${{ steps.get_version.outputs.version }}.jar`
            2. 放入服务器 `plugins/` 目录
            3. 重启服务器

            ### 要求
            - Paper 1.20.1+
            - Java 17+

            ### 更新日志
            ${{ github.event.head_commit.message }}

            ---
            构建提交：${{ github.sha }}
          files: fakeplayer-plugin/target/FakePlayer-*.jar
          draft: false
          prerelease: false
