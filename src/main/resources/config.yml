# RandomBots 配置文件
# ── 多假人驻留模式 ──────────────────────────────────────────────────────
# 同时维持 bot-count 个假人在线；死亡/断线后等待 respawn-delay 秒自动重连。

# 目标服务器（可被 SERVER_PORT 环境变量覆盖）
server-host: "localhost"
server-port: 25565

# 同时在线假人数量
bot-count: 3

# 是否显示调试日志（false = 只显示关键信息，true = 显示所有包/连接日志）
debug-log: false

# 死亡或断线后多少秒重连
respawn-delay: 5

# 聊天间隔（秒）
chat-interval-min: 15
chat-interval-max: 45

# 动作间隔（秒，随机移动/摆手/蹲起）
action-interval-min: 5
action-interval-max: 15

# 假人名字前缀 / 后缀（随机组合，最长 16 字符）
name-prefixes:
  - "Dark"
  - "Shadow"
  - "Iron"
  - "Storm"
  - "Frost"
  - "Blaze"
  - "Thunder"
  - "Void"
  - "Neon"
  - "Pixel"
  - "Cyber"
  - "Wild"
  - "Swift"
  - "Brave"
  - "Lone"

name-suffixes:
  - "Walker"
  - "Blade"
  - "Hunter"
  - "Seeker"
  - "Rider"
  - "Forge"
  - "Strike"
  - "Hawk"
  - "Wolf"
  - "Axe"
  - "Fist"
  - "Eye"
  - "Claw"
  - "Shield"
  - "Arrow"

# 聊天语句（为空则使用内置话题池）
chat-messages:
  - "大家好啊！"
  - "服务器真好玩！"
  - "有人要一起玩吗？"
  - "我来了！"
  - "这里真漂亮~"
  - "谁有好东西分享？"
  - "今天天气真不错"
  - "我要去探险了！"
  - "哇，这是什么地方！"
  - "一起来建房子吧！"
  - "感觉这里很危险..."
  - "找到宝藏了！"
  - "小心怪物！"
  - "哈哈哈好有趣"
  - "有没有人在？"
  - "我迷路了lol"
  - "谁能帮帮我？"
  - "太厉害了！"
  - "我要变强！"
  - "努力挖矿中..."
