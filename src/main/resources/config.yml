# RandomBots Configuration
# Bot count range (random between min and max)
bot-count-min: 3
bot-count-max: 10

# Server connection (falls back to SERVER_PORT env variable)
server-host: "localhost"
server-port: 25565  # overridden by SERVER_PORT env var if set

# Chat settings
chat-interval-min: 15   # seconds between bot messages (min)
chat-interval-max: 45   # seconds between bot messages (max)

# Action settings
action-interval-min: 5   # seconds between actions (min)
action-interval-max: 15  # seconds between actions (max)

# Respawn delay (seconds after bot death)
respawn-delay: 5

# Bot name prefixes/suffixes for generation
name-prefixes:
  - "Dark"
  - "Shadow"
  - "Iron"
  - "Storm"
  - "Frost"
  - "Blaze"
  - "Thunder"
  - "Void"
  - "Neon"
  - "Pixel"
  - "Cyber"
  - "Wild"
  - "Swift"
  - "Brave"
  - "Lone"

name-suffixes:
  - "Walker"
  - "Blade"
  - "Hunter"
  - "Seeker"
  - "Rider"
  - "Forge"
  - "Strike"
  - "Hawk"
  - "Wolf"
  - "Axe"
  - "Fist"
  - "Eye"
  - "Claw"
  - "Shield"
  - "Arrow"

# Chat messages bots will say
chat-messages:
  - "大家好啊！"
  - "服务器真好玩！"
  - "有人要一起玩吗？"
  - "我来了！"
