# FakePlayer Configuration
bot:
  # Range of bots to spawn on startup
  min-count: 3
  max-count: 6
  # Ticks between each AI action (20 = 1 second)
  action-interval: 60
  # Ticks to wait before spawning a replacement after a bot dies (200 = 10s)
  respawn-delay: 200
  # World to spawn bots in (leave empty for default world)
  world: ""
