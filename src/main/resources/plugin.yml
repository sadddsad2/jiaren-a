name: FakePlayer
version: '1.0.0'
main: com.example.fakeplayer.FakePlayerPlugin
api-version: '1.20'
description: Lightweight fake player bots for Paper 1.20+ (NMS injection, online-mode compatible)
authors: [ Example ]

commands:
  fakeplayer:
    description: Manage fake player bots
    usage: /fakeplayer <spawn|remove <name>|removeall|list>
    aliases: [ fp ]
    permission: fakeplayer.admin

permissions:
  fakeplayer.admin:
    description: Manage fake players
    default: op
