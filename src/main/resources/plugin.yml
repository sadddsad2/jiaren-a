name: RandomBots
version: ${project.version}
main: com.randomnpcs.RandomBotsPlugin
api-version: '1.21'
description: Spawns random NPC bots that chat, move, and respawn on death
author: RandomBots
website: https://github.com/randomnpcs

commands:
  randombots:
    description: Main command for RandomBots plugin
    usage: /randombots <start|stop|status|reload>
    aliases: [rbots, rb]
    permission: randombots.admin

permissions:
  randombots.admin:
    description: Allows full control of RandomBots
    default: op
